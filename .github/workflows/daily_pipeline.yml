name: Daily ETL Pipeline (Fast)

on:
  schedule:
    # Runs 3x daily — 6 AM, 12 PM, 6 PM UTC
    # Uses 60 of 100 NewsAPI daily requests (20 keywords x 3 runs)
    - cron: '0 6 * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas psycopg2-binary pymongo python-dotenv

      - name: Run fast ETL (metadata only, no text fetching)
        env:
          NEWS_API_KEY:       ${{ secrets.NEWS_API_KEY }}
          FRED_API_KEY:       ${{ secrets.FRED_API_KEY }}
          SUPABASE_HOST:      ${{ secrets.SUPABASE_HOST }}
          SUPABASE_PORT:      ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DB:        ${{ secrets.SUPABASE_DB }}
          SUPABASE_USER:      ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD:  ${{ secrets.SUPABASE_PASSWORD }}
          MONGO_URI:          ${{ secrets.MONGO_URI }}
          ALPACA_API_KEY:     ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:  ${{ secrets.ALPACA_SECRET_KEY }}
          FETCH_FILING_TEXT:  "false"
        run: python pipeline.py

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-log-${{ github.run_id }}
          path: pipeline_log.txt
          if-no-files-found: ignore
          retention-days: 3
